<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <title>Portal da Empresa • tariel.ia</title>
    <script src="/static/js/shared/theme_bootstrap.js"></script>
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin/admin_auth_shell.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/cliente/cliente_auth.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/official_visual_system.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/auth_login_standard.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/auth_login_unified.css?v={{ v_app }}">
</head>
<body class="auth-shell auth-shell--cliente auth-shell--standard-login">
    <main class="auth-layout auth-layout--split">
        <section class="auth-hero" aria-hidden="true">
            <div class="auth-hero-placeholder"></div>
            <img src="/static/img/logo-horizontal-dark.png" alt="tariel.ia">
            <div class="auth-portal-identity">
                <strong class="auth-portal-identity__title">Portal da Empresa</strong>
            </div>
        </section>

        <section class="auth-card">
            <div class="auth-card-shell auth-login-standard">
                <div class="auth-intro">
                    <strong class="auth-intro__title">Portal da Empresa</strong>
                </div>

                {% if primeiro_acesso %}
                <div class="auth-inline-banner" role="status" aria-live="polite">
                    Primeiro acesso: entre com o e-mail informado no cadastro da conta e com a senha temporária recebida em canal seguro.
                </div>
                {% endif %}

                {% if erro %}
                <div class="auth-error" role="alert" aria-live="assertive">{{ erro }}</div>
                {% endif %}

                <form class="auth-form auth-form--minimal" method="post" action="/cliente/login" data-auth-form data-auth-standard-form>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="primeiro_acesso" value="{{ '1' if primeiro_acesso else '' }}">

                    <div class="auth-field">
                        <input id="email" type="email" name="email" autocomplete="username" placeholder="E-mail de acesso" value="{{ email_prefill | default('', true) | e }}" required aria-label="E-mail de acesso">
                    </div>

                    <div class="auth-field auth-field--password">
                        <input id="senha" type="password" name="senha" autocomplete="current-password" placeholder="Senha" required aria-label="Senha">
                        <button class="auth-toggle" type="button" data-password-toggle data-password-target="senha" aria-label="Mostrar senha" aria-pressed="false">
                            <span data-password-toggle-label>Mostrar</span>
                        </button>
                    </div>

                    <div class="auth-utility">
                        <label class="auth-checkbox">
                            <input type="checkbox" name="lembrar" value="true">
                            <span>Lembrar acesso</span>
                        </label>
                        <button class="auth-helper-link auth-link-button" type="button" data-auth-support-action data-auth-support-context="do Portal da Empresa" data-auth-support-message="Para recuperar senha do Portal da Empresa, fale com a Tariel ou com o responsavel interno da conta.">
                            Esqueci a senha
                        </button>
                    </div>

                    <button class="auth-button" type="submit" data-loading-label="Entrando...">Acessar</button>
                </form>

                <div class="auth-provider-group">
                    <div class="auth-provider-actions" aria-label="Contas corporativas">
                        <button class="auth-provider-button auth-provider-button--google" type="button" data-provider-link="Google" data-provider-url="/auth/social/cliente/google/start" data-provider-feedback-message="Login com Google no Portal da Empresa sera liberado para contas autorizadas da empresa." aria-label="Entrar com Google">
                            <span class="auth-provider-mark" aria-hidden="true">G</span>
                            <span>Google</span>
                        </button>
                        <button class="auth-provider-button auth-provider-button--apple" type="button" data-provider-link="Apple" data-provider-feedback-message="Login com Apple no Portal da Empresa sera liberado para contas autorizadas da empresa." aria-label="Entrar com Apple">
                            <span class="auth-provider-mark" aria-hidden="true">A</span>
                            <span>Apple</span>
                        </button>
                        <button class="auth-provider-button auth-provider-button--microsoft" type="button" data-provider-link="Microsoft" data-provider-url="/auth/social/cliente/microsoft/start" data-provider-feedback-message="Login com Microsoft no Portal da Empresa sera liberado para contas autorizadas da empresa." aria-label="Entrar com Microsoft">
                            <span class="auth-provider-mark auth-provider-mark--microsoft" aria-hidden="true">
                                <span></span><span></span><span></span><span></span>
                            </span>
                            <span>Microsoft</span>
                        </button>
                    </div>
                </div>
                <p class="auth-provider-feedback" data-auth-feedback hidden aria-live="polite"></p>

            </div>
        </section>
    </main>

    <script src="/static/js/shared/auth_login_standard.js?v={{ v_app }}" defer nonce="{{ csp_nonce }}"></script>
</body>
</html>
