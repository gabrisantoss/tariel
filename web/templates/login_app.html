<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f3f6f9">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <title>Portal do Inspetor • tariel.ia</title>
    <script src="/static/js/shared/theme_bootstrap.js"></script>
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin/admin_auth_shell.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/cliente/cliente_auth.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/official_visual_system.css?v={{ v_app }}">
</head>
<body class="auth-shell auth-shell--cliente auth-shell--portal">
    <main class="auth-layout auth-layout--split">
        <section class="auth-hero" aria-hidden="true">
            <div class="auth-hero-placeholder"></div>
            <img src="/static/img/logo-horizontal-dark.png" alt="tariel.ia">
            <span class="auth-hero-label">Portal do Inspetor</span>
        </section>

        <section class="auth-card">
            <div class="auth-card-shell">
                <div class="auth-intro">
                    <span class="auth-context-badge">Portal do Inspetor</span>
                    <strong class="auth-intro__title">Login</strong>
                </div>

                {% if erro %}
                <div class="auth-error" role="alert" aria-live="assertive">{{ erro | e }}</div>
                {% endif %}

                <form method="POST" action="/app/login" class="auth-form auth-form--minimal" novalidate data-auth-form>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                    <div class="auth-field">
                        <input type="email" id="email" name="email" required autocomplete="username"
                            autocapitalize="off" spellcheck="false" inputmode="email" placeholder="E-mail" aria-label="E-mail corporativo">
                    </div>

                    <div class="auth-field">
                        <input type="password" id="senha" name="senha" required autocomplete="current-password" placeholder="Senha" aria-label="Senha">
                    </div>

                    <button type="submit" class="auth-button" id="btn-login" data-submit-label="Acessar">Acessar</button>
                </form>

                <div class="auth-provider-actions" aria-label="Vincular conta corporativa">
                    <button class="auth-provider-button auth-provider-button--google" type="button" data-provider-link="Google" aria-label="Vincular conta Google">
                        <span class="auth-provider-mark" aria-hidden="true">G</span>
                        <span>Google</span>
                    </button>
                    <button class="auth-provider-button auth-provider-button--apple" type="button" data-provider-link="Apple" aria-label="Vincular conta Apple">
                        <span class="auth-provider-mark" aria-hidden="true">A</span>
                        <span>Apple</span>
                    </button>
                    <button class="auth-provider-button auth-provider-button--microsoft" type="button" data-provider-link="Microsoft" aria-label="Vincular conta Microsoft">
                        <span class="auth-provider-mark auth-provider-mark--microsoft" aria-hidden="true">
                            <span></span><span></span><span></span><span></span>
                        </span>
                        <span>Microsoft</span>
                    </button>
                </div>
                <p class="auth-provider-feedback" data-provider-feedback hidden aria-live="polite"></p>

                <p class="auth-access-note">Precisa de acesso ou apoio no primeiro login? Fale com o administrador da empresa.</p>
            </div>
        </section>
    </main>

    <script nonce="{{ csp_nonce }}">
        (() => {
            "use strict";

            document.querySelectorAll("[data-auth-form]").forEach((form) => {
                form.addEventListener("submit", () => {
                    try {
                        sessionStorage.removeItem("tariel_force_home_landing");
                        sessionStorage.removeItem("tariel_workspace_retomada_home_pendente");
                        localStorage.removeItem("tariel_laudo_atual");
                    } catch (_) {
                        // armazenamento opcional
                    }

                    const botao = form.querySelector(".auth-button");
                    if (!botao) return;
                    botao.disabled = true;
                    botao.innerHTML = "<span>Entrando...</span>";
                });
            });

            const feedback = document.querySelector("[data-provider-feedback]");
            document.querySelectorAll("[data-provider-link]").forEach((button) => {
                button.addEventListener("click", () => {
                    if (!feedback) return;
                    const provider = button.getAttribute("data-provider-link") || "provedor";
                    feedback.hidden = false;
                    feedback.textContent = `Vinculo com ${provider} sera liberado pela Tariel para contas autorizadas da empresa.`;
                });
            });
        })();
    </script>
</body>
</html>
