<section
    id="admin-support"
    class="admin-stage admin-tab-panel cliente-management-section cliente-management-section--support"
    data-admin-stage="support"
    data-admin-panel="support"
    data-stage-state="idle"
    role="tabpanel"
    aria-labelledby="admin-section-tab-support"
    {% if (cliente_admin_section_inicial | default('overview')) != 'support' %}hidden{% endif %}
>
    <div class="admin-stage-head cliente-management-section__head">
        <div class="admin-stage-copy">
            <span class="admin-stage-kicker">Suporte</span>
            <h3>Chamados e histórico</h3>
        </div>

        <div class="admin-stage-meta">
            <span class="hero-chip">Falar com suporte</span>
            <span class="hero-chip">Exportar diagnóstico</span>
            <span class="hero-chip">Histórico de ações</span>
        </div>
    </div>

    <div id="admin-support-brief" class="admin-stage-brief"></div>

    <div class="admin-stage-grid admin-stage-grid--split admin-stage-grid--support cliente-management-support-grid">
        <article class="box" id="admin-suporte">
            <div class="toolbar">
                <div class="toolbar-copy">
                    <h3>Falar com suporte</h3>
                </div>
            </div>

            <div id="admin-support-policy" class="support-policy-grid"></div>
            <div id="admin-support-protocol" class="support-protocol"></div>
            <div id="admin-diagnostico-resumo" class="toolbar-meta support-diagnostic-chips"></div>

            <div class="toolbar-actions toolbar-actions--section">
                <button id="btn-exportar-diagnostico" class="btn" type="button">Exportar diagnóstico</button>
                <button id="btn-whatsapp-suporte" class="btn ghost" type="button">Falar com suporte</button>
            </div>

            <form id="form-suporte-cliente" class="stack form-stack">
                <label>
                    Título
                    <input id="suporte-titulo" maxlength="120" placeholder="Resumo do caso">
                </label>
                <label>
                    E-mail de retorno
                    <input id="suporte-email" type="email" maxlength="254" placeholder="contato@empresa.com">
                </label>
                <label>
                    Mensagem
                    <textarea id="suporte-mensagem" rows="4" maxlength="4000" placeholder="Descreva o problema, contexto ou decisão que precisa de suporte." required></textarea>
                </label>
                <button id="btn-reportar-suporte" class="btn primary" type="submit">Abrir chamado</button>
            </form>
        </article>

        <article class="box" id="admin-auditoria">
            <div class="toolbar">
                <div class="toolbar-copy">
                    <h3>Histórico de ações</h3>
                </div>

                <div class="toolbar-actions toolbar-actions--audit">
                    <input id="admin-auditoria-busca" type="search" placeholder="Buscar no histórico">
                    <button id="btn-admin-auditoria-limpar" class="btn ghost" type="button">Limpar</button>
                </div>
            </div>

            <div id="admin-audit-overview" class="summary-grid"></div>
            <div id="admin-auditoria-filtros" class="filter-chip-list" role="toolbar" aria-label="Filtros do histórico de ações"></div>
            <div id="admin-auditoria-lista" class="activity-list activity-list--timeline"></div>
        </article>
    </div>
</section>
