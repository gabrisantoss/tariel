<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f3f6f9">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    <title>Revisão Técnica • tariel.ia</title>
    <script src="/static/js/shared/theme_bootstrap.js"></script>
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/shared/auth_shell.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/official_visual_system.css?v={{ v_app }}">
    <link rel="stylesheet" href="/static/css/shared/auth_login_standard.css?v={{ v_app }}">
</head>
<body class="auth-shell auth-shell--mesa-login">
    <main class="auth-layout auth-layout--split">
        <section class="auth-hero" aria-hidden="true">
            <div class="auth-hero-placeholder"></div>
            <span class="auth-hero-label">Revisão Técnica</span>
        </section>

        <section class="auth-card">
            <div class="auth-card-shell auth-login-standard">
                <div class="auth-intro">
                    <span class="auth-context-badge">Revisão Técnica</span>
                    <strong class="auth-intro__title">Login</strong>
                    <p class="auth-intro__copy">Acesso de revisão para conferir evidências, pendências e laudos antes da entrega.</p>
                </div>

                {% if erro %}
                <div class="auth-error" role="alert" aria-live="assertive">{{ erro | e }}</div>
                {% endif %}

                <form method="POST" action="/revisao/login" class="auth-form auth-form--minimal" data-auth-form data-auth-standard-form>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                    <div class="auth-field">
                        <input type="email" id="email" name="email" required autocomplete="username"
                            autocapitalize="off" spellcheck="false" inputmode="email" placeholder="E-mail" aria-label="E-mail corporativo">
                    </div>

                    <div class="auth-field auth-field--password">
                        <input type="password" id="senha" name="senha" required autocomplete="current-password" placeholder="Senha" aria-label="Senha">
                        <button class="auth-toggle" type="button" data-password-toggle data-password-target="senha" aria-label="Mostrar senha" aria-pressed="false">
                            <span data-password-toggle-label>Mostrar</span>
                        </button>
                    </div>

                    <div class="auth-utility">
                        <label class="auth-checkbox">
                            <input type="checkbox" name="lembrar" value="true">
                            <span>Lembrar acesso</span>
                        </label>
                        <button class="auth-helper-link auth-link-button" type="button" data-auth-support-action data-auth-support-context="da Revisão Técnica" data-auth-support-message="Para recuperar senha da Revisão Técnica, fale com o administrador da empresa.">
                            Esqueci a senha
                        </button>
                    </div>

                    <button type="submit" class="auth-button" id="btn-login" data-submit-label="Acessar" data-loading-label="Entrando...">Acessar</button>
                </form>

                <div class="auth-provider-group">
                    <p class="auth-provider-title">Entrar com conta corporativa</p>
                    <div class="auth-provider-actions" aria-label="Entrar com conta corporativa">
                        <button class="auth-provider-button auth-provider-button--google" type="button" data-provider-link="Google" data-provider-url="/auth/social/revisao/google/start" data-provider-feedback-message="Login com Google na Revisão Técnica sera liberado para contas autorizadas da empresa." aria-label="Entrar com Google">
                            <span class="auth-provider-mark" aria-hidden="true">G</span>
                            <span>Google</span>
                        </button>
                        <button class="auth-provider-button auth-provider-button--apple" type="button" data-provider-link="Apple" data-provider-feedback-message="Login com Apple na Revisão Técnica sera liberado para contas autorizadas da empresa." aria-label="Entrar com Apple">
                            <span class="auth-provider-mark" aria-hidden="true">A</span>
                            <span>Apple</span>
                        </button>
                        <button class="auth-provider-button auth-provider-button--microsoft" type="button" data-provider-link="Microsoft" data-provider-url="/auth/social/revisao/microsoft/start" data-provider-feedback-message="Login com Microsoft na Revisão Técnica sera liberado para contas autorizadas da empresa." aria-label="Entrar com Microsoft">
                            <span class="auth-provider-mark auth-provider-mark--microsoft" aria-hidden="true">
                                <span></span><span></span><span></span><span></span>
                            </span>
                            <span>Microsoft</span>
                        </button>
                    </div>
                </div>
                <p class="auth-provider-feedback" data-auth-feedback hidden aria-live="polite"></p>

                <nav class="auth-portal-switcher" aria-label="Escolher outro portal">
                    <span class="auth-portal-switcher__label">Portais de acesso</span>
                    <div class="auth-portal-switcher__links">
                        <a class="auth-portal-option" href="/cliente/login">Admin Cliente</a>
                        <a class="auth-portal-option" href="/app/login">Inspeção IA</a>
                        <a class="auth-portal-option is-active" href="/revisao/login" aria-current="page">Revisão Técnica</a>
                    </div>
                </nav>

                <p class="auth-access-note">Quer um acesso? Fale com o administrador.</p>
            </div>
        </section>
    </main>

    <script src="/static/js/shared/auth_login_standard.js?v={{ v_app }}" defer nonce="{{ csp_nonce }}"></script>
</body>
</html>
