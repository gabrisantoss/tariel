<section class="workspace-channel-stage workspace-channel-stage--ia" aria-label="Chat Tariel">
    <div class="workspace-channel-toolbar">
        <div class="workspace-channel-toolbar__start">
            <a
                href="/app/?home=1"
                class="technical-record-back workspace-channel-back"
                data-action="go-home"
                data-home-destino="/app/?home=1"
                aria-label="Voltar para o Portal do Inspetor"
            >
                <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
                <span>Portal</span>
            </a>
        </div>
    </div>

    <div
        id="area-mensagens"
        class="area-mensagens workspace-conversation-thread"
        data-conversation-thread="messages"
        data-conversation-variant="technical"
        role="log"
        aria-relevant="additions text"
        aria-label="Conversa com o assistente"
    >
        <div
            id="workspace-conversation-empty"
            class="technical-chat-empty technical-chat-empty--conversation"
            aria-live="polite"
            aria-hidden="true"
            hidden
        >
            <div class="workspace-conversation-empty__hero">
                <span class="material-symbols-rounded" aria-hidden="true">chat</span>
                <div class="workspace-conversation-empty__copy">
                    <span class="workspace-conversation-empty__eyebrow">Tariel IA</span>
                    <strong>Comece pelo que você viu</strong>
                    <p>Ativo, local, evidência ou dúvida técnica.</p>
                </div>
            </div>

            <div class="workspace-conversation-empty__actions" aria-label="Ações para começar">
                <button
                    type="button"
                    class="workspace-conversation-empty__action workspace-conversation-empty__action--primary"
                    data-open-inspecao-modal
                    data-inspector-entry="conversation-empty-new-inspection"
                    aria-haspopup="dialog"
                    aria-controls="modal-nova-inspecao"
                    aria-expanded="false"
                >
                    <span class="material-symbols-rounded" aria-hidden="true">assignment_add</span>
                    <span>Nova inspeção</span>
                </button>

                <button
                    type="button"
                    class="workspace-conversation-empty__starter"
                    data-suggestion-text="Vou te passar o contexto do equipamento e do cenário. Estruture a sessão técnica e diga o que preciso observar primeiro."
                >
                    <span class="material-symbols-rounded" aria-hidden="true">schema</span>
                    <strong>Estruturar</strong>
                    <span>Contexto</span>
                </button>

                <button
                    type="button"
                    class="workspace-conversation-empty__starter"
                    data-suggestion-text="Tenho uma dúvida técnica. Me responda de forma objetiva, auditável e com os critérios que preciso verificar em campo."
                >
                    <span class="material-symbols-rounded" aria-hidden="true">help</span>
                    <strong>Dúvida técnica</strong>
                    <span>Critérios</span>
                </button>
            </div>

            <div class="workspace-conversation-empty__tips" aria-label="Informações úteis para a primeira mensagem">
                <span class="workspace-conversation-empty__tip">Ativo ou TAG</span>
                <span class="workspace-conversation-empty__tip">Local e setor</span>
                <span class="workspace-conversation-empty__tip">Sintoma observado</span>
                <span class="workspace-conversation-empty__tip">Fotos ou PDF</span>
            </div>
        </div>

        <div
            id="indicador-digitando"
            class="indicador-digitando linha-mensagem mensagem-ia workspace-message-row workspace-message-row--assistant workspace-message-row--typing"
            role="status"
            aria-label="Assistente digitando"
            aria-hidden="true"
        >
            <div class="conteudo-mensagem workspace-message-shell">
                <div class="avatar avatar-digitando workspace-message-avatar" aria-hidden="true">
                    <span class="workspace-message-avatar__brand" aria-hidden="true">T</span>
                </div>
                <div class="bolha-digitando corpo-texto workspace-message-card" aria-hidden="true">
                    <span class="bolha-digitando__dots" aria-hidden="true">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </span>
                    <span class="bolha-digitando__label" data-typing-label>Tariel analisando...</span>
                </div>
            </div>
        </div>
    </div>

    <button
        type="button"
        id="btn-ir-fim-chat"
        class="btn-ir-fim-chat"
        aria-label="Ir para última mensagem"
        title="Ir para última mensagem"
        hidden
    >
        <span class="material-symbols-rounded" aria-hidden="true">arrow_downward</span>
    </button>
</section>
